<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outpaint Batch App</title>
</head>
<body style="font-family:sans-serif; padding:10px; max-width:600px; margin:auto;">

<h2>16:9 Outpaint Batch</h2>

<input type="file" id="files" multiple accept="image/*"><br><br>
<button onclick="processBatch()">Process</button>

<p id="status"></p>

<pre id="log" style="background:#111;color:#0f0;font-size:0.7rem;padding:8px;border-radius:4px;white-space:pre-wrap;word-break:break-all;display:none;max-height:200px;overflow-y:auto;"></pre>

<div id="gallery" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;"></div>

<script>
function log(msg) {
  var el = document.getElementById('log');
  el.style.display = 'block';
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function base64ToBlob(base64, mime) {
  var bytes = atob(base64);
  var arr = new Uint8Array(bytes.length);
  for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function downloadBlob(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

async function padTo16by9(file) {
  return new Promise(function(resolve) {
    var img = new Image();
    var reader = new FileReader();
    reader.onload = function() { img.src = reader.result; };
    reader.readAsDataURL(file);

    img.onload = function() {
      var targetAspect = 16 / 9;
      var w = img.width, h = img.height;
      var canvasW, canvasH;

      if (w / h > targetAspect) {
        canvasW = w;
        canvasH = Math.round(w / targetAspect);
      } else {
        canvasH = h;
        canvasW = Math.round(h * targetAspect);
      }

      var canvas = document.createElement('canvas');
      canvas.width = canvasW;
      canvas.height = canvasH;
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvasW, canvasH);
      ctx.drawImage(img, (canvasW - w) / 2, (canvasH - h) / 2);

      log('Padded ' + file.name + ': ' + w + 'x' + h + ' -> ' + canvasW + 'x' + canvasH);
      resolve(canvas.toDataURL('image/png').split(',')[1]);
    };
  });
}

async function processBatch() {
  var files = document.getElementById('files').files;
  var gallery = document.getElementById('gallery');
  var status = document.getElementById('status');

  gallery.innerHTML = '';
  document.getElementById('log').textContent = '';

  if (!files.length) {
    status.innerText = 'No files selected.';
    return;
  }

  for (var i = 0; i < files.length; i++) {
    status.innerText = 'Processing ' + (i + 1) + '/' + files.length + '...';
    log('\n--- Image ' + (i + 1) + ': ' + files[i].name + ' ---');

    var imageBase64;
    try {
      imageBase64 = await padTo16by9(files[i]);
    } catch(err) {
      log('Pad error: ' + err.message);
      continue;
    }

    var res, data;
    try {
      log('POSTing to /api/outpaint...');
      res = await fetch('/api/outpaint', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imageBase64: imageBase64 })
      });
      log('HTTP ' + res.status);
      data = await res.json();
      log('Keys: ' + Object.keys(data).join(', '));
    } catch(err) {
      log('Fetch error: ' + err.message);
      continue;
    }

    if (data.error) {
      log('API error: ' + data.error);
      status.innerText = 'Error on image ' + (i + 1) + ': ' + data.error;
      continue;
    }

    if (data.finalImage) {
      log('Got image, adding to gallery.');

      // Show preview
      var imgEl = document.createElement('img');
      imgEl.src = 'data:image/png;base64,' + data.finalImage;
      imgEl.style.cssText = 'width:100%;border-radius:4px 4px 0 0;display:block;';

      // Download button using Blob (works on Android Chrome)
      var btn = document.createElement('button');
      btn.textContent = 'Download';
      btn.style.cssText = 'width:100%;padding:8px;background:#333;color:#fff;border:none;border-radius:0 0 4px 4px;font-size:0.9rem;cursor:pointer;';

      // Capture base64 for this image in closure
      (function(b64, idx) {
        btn.onclick = function() {
          var blob = base64ToBlob(b64, 'image/png');
          downloadBlob(blob, 'outpainted_' + idx + '.png');
        };
      })(data.finalImage, i + 1);

      var card = document.createElement('div');
      card.style.cssText = 'width:48%;border:1px solid #ddd;border-radius:6px;overflow:hidden;';
      card.appendChild(imgEl);
      card.appendChild(btn);

      gallery.appendChild(card);
    } else {
      log('No finalImage. Response: ' + JSON.stringify(data).slice(0, 300));
    }
  }

  status.innerText = 'Done';
}
</script>

</body>
</html>
