<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outpaint Batch App</title>
</head>
<body style="font-family:sans-serif; padding:10px; max-width:600px; margin:auto;">

<h2>16:9 Outpaint Batch</h2>

<input type="file" id="files" multiple accept="image/*"><br><br>
<button onclick="processBatch()">Process</button>

<p id="status"></p>

<div id="gallery" style="display:flex; flex-wrap:wrap; gap:10px;"></div>

<script>
async function padTo16by9(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = () => img.src = reader.result;
    reader.readAsDataURL(file);

    img.onload = () => {
      const targetAspect = 16/9;
      let w = img.width, h = img.height;

      let canvasW, canvasH;
      if (w/h > targetAspect) {
        canvasW = w;
        canvasH = Math.round(w/targetAspect);
      } else {
        canvasH = h;
        canvasW = Math.round(h*targetAspect);
      }

      const canvas = document.createElement("canvas");
      canvas.width = canvasW;
      canvas.height = canvasH;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0,0,canvasW,canvasH);

      ctx.drawImage(img, (canvasW-w)/2, (canvasH-h)/2);

      resolve(canvas.toDataURL("image/png").split(",")[1]);
    };
  });
}

async function processBatch() {
  const files = document.getElementById("files").files;
  const gallery = document.getElementById("gallery");
  const status = document.getElementById("status");

  gallery.innerHTML = "";

  for (let i = 0; i < files.length; i++) {
    status.innerText = `Processing ${i+1}/${files.length}`;

    const base64 = await padTo16by9(files[i]);

    const res = await fetch("/api/outpaint", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ imageBase64: base64 })
    });

    const data = await res.json();

    if (data.finalImage) {
      const img = document.createElement("img");
      img.src = "data:image/png;base64," + data.finalImage;
      img.style.width = "48%";
      gallery.appendChild(img);
    }
  }

  status.innerText = "Done";
}
</script>

</body>
</html>
